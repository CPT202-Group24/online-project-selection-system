<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Project Selection System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

<div class="auth-shell">
    <div class="auth-card">

        <div class="auth-brand">
            <div class="auth-brand-icon">🎓</div>
            <div>
                <h1>Project Selection System</h1>
                <p>Create your account to get started</p>
            </div>
        </div>

        <div class="auth-header">
            <h2>Register</h2>
            <p>Use your university email to create an account.</p>
        </div>

        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" method="post" class="auth-form">

            <div class="modern-form-group">
                <label for="name">Full Name</label>
                <input id="name"
                       type="text"
                       name="name"
                       class="modern-input"
                       placeholder="Your full name"
                       required>
            </div>

            <div class="modern-form-group">
                <label for="email">Email</label>
                <input id="email"
                       type="email"
                       name="email"
                       class="modern-input"
                       placeholder="your@student.xjtlu.edu.cn or your@xjtlu.edu.cn"
                       required>
            </div>

            <div class="modern-form-group">
                <label for="password">Password</label>
                <input id="password"
                       type="password"
                       name="password"
                       class="modern-input"
                       placeholder="At least 6 characters"
                       required
                       minlength="6">
            </div>

            <div class="modern-form-group">
                <label for="role">Role</label>
                <select id="role" name="role" class="modern-input">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>

            <button type="submit" class="modern-btn modern-btn-primary auth-submit-btn">
                Register
            </button>
        </form>

        <div class="auth-links">
            <span>Already have an account? <a th:href="@{/login}">Login here</a></span>
        </div>

    </div>
</div>

</body>
</html>
