<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Project Selection System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Reset Password</h2>

    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}">
    </div>

    <form th:action="@{/reset-password}" method="post" id="resetForm">
        <input type="hidden" name="token" th:value="${token}">
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="password" id="password" placeholder="At least 6 characters" required minlength="6">
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Re-enter new password" required>
        </div>
        <div id="matchError" class="field-error" style="display: none;">Passwords do not match</div>
        <button type="submit" id="submitBtn">Reset Password</button>
    </form>
</div>

<script>
    (function () {
        var password = document.getElementById('password');
        var confirm = document.getElementById('confirmPassword');
        var error = document.getElementById('matchError');
        var btn = document.getElementById('submitBtn');

        function check() {
            var match = password.value === confirm.value;
            error.style.display = match ? 'none' : 'block';
            btn.disabled = !match;
            if (!match) {
                btn.classList.add('disabled-btn');
            } else {
                btn.classList.remove('disabled-btn');
            }
        }

        confirm.addEventListener('input', check);
        password.addEventListener('input', check);
    })();
</script>
</body>
</html>
