<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Project Selection System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

<div class="auth-shell">
    <div class="auth-card">

        <div class="auth-brand">
            <div class="auth-brand-icon">🎓</div>
            <div>
                <h1>Project Selection System</h1>
                <p>Create a new password for your account</p>
            </div>
        </div>

        <div class="auth-header">
            <h2>Reset Password</h2>
            <p>Please enter and confirm your new password.</p>
        </div>

        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}">
        </div>

        <form th:action="@{/reset-password}" method="post" id="resetForm" class="auth-form">
            <input type="hidden" name="token" th:value="${token}">

            <div class="modern-form-group">
                <label for="password">New Password</label>
                <input id="password"
                       type="password"
                       name="password"
                       class="modern-input"
                       placeholder="At least 8 chars, with upper/lowercase and a digit"
                       required
                       minlength="8">
            </div>

            <div class="modern-form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword"
                       type="password"
                       name="confirmPassword"
                       class="modern-input"
                       placeholder="Re-enter new password"
                       required>
            </div>

            <div id="matchError" class="field-error" style="display: none;">
                Passwords do not match
            </div>

            <button type="submit"
                    id="submitBtn"
                    class="modern-btn modern-btn-primary auth-submit-btn">
                Reset Password
            </button>
        </form>

        <div class="auth-links">
            <a th:href="@{/login}">← Back to Login</a>
        </div>

    </div>
</div>

<script>
    (function () {
        var password = document.getElementById('password');
        var confirm = document.getElementById('confirmPassword');
        var error = document.getElementById('matchError');
        var btn = document.getElementById('submitBtn');

        function check() {
            var match = password.value === confirm.value;

            error.style.display = match ? 'none' : 'block';
            btn.disabled = !match;

            if (!match) {
                btn.classList.add('disabled-btn');
            } else {
                btn.classList.remove('disabled-btn');
            }
        }

        confirm.addEventListener('input', check);
        password.addEventListener('input', check);
    })();
</script>

</body>
</html>
