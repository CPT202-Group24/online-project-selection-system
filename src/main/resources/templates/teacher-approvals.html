<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Teacher Approval Dashboard</title>
    <!-- 引入你项目原有的 CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .approval-table { width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .approval-table th, .approval-table td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        .approval-table th { background-color: #f4f4f4; }
        .details-row { display: none; background-color: #fdfdfd; }
        .details-content { padding: 15px; border-left: 5px solid #2196F3; margin: 5px 0; }
        .btn { padding: 8px 15px; border: none; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .btn-detail { background-color: #2196F3; color: white; }
        .btn-accept { background-color: #4CAF50; color: white; }
        .btn-reject { background-color: #f44336; color: white; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .alert { padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .alert-success { background-color: #d4edda; color: #155724; }
        .alert-error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<!-- 引入导航栏（假设你的 nav 片段叫 sharedNav） -->
<div th:replace="~{fragments/nav :: sharedNav}"></div>

<div class="container">
    <h2>M6: Teacher Approval Dashboard</h2>

    <!-- 操作提示消息 -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <!-- 空列表显示提示 -->
    <div th:if="${#lists.isEmpty(applications)}" style="text-align: center; margin-top: 50px;">
        <p>No pending applications at the moment.</p>
    </div>

    <!-- 申请列表 -->
    <table th:if="${!#lists.isEmpty(applications)}" class="approval-table">
        <thead>
        <tr>
            <th>Student Name</th>
            <th>Project Applied</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody th:each="app : ${applications}">
        <tr>
            <td th:text="${app.student.name}"></td>
            <td th:text="${app.project.title}"></td>
            <td><b th:text="${app.status}"></b></td>
            <td>
                <!-- 查看详情按钮 -->
                <button class="btn btn-detail" th:onclick="'toggleDetails(' + ${app.id} + ')'">View Details</button>

                <!-- 接受申请：点击后禁用 -->
                <form th:action="@{/teacher/approvals/{id}/accept(id=${app.id})}" method="post" style="display:inline;" onsubmit="handleAccept(this)">
                    <button type="submit" class="btn btn-accept">Accept</button>
                </form>

                <!-- 拒绝申请：二次确认 -->
                <form th:action="@{/teacher/approvals/{id}/reject(id=${app.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('Are you sure you want to reject this student?');">
                    <button type="submit" class="btn btn-reject">Reject</button>
                </form>
            </td>
        </tr>
        <!-- 隐藏的学生详情行 -->
        <tr th:id="'details-' + ${app.id}" class="details-row">
            <td colspan="4">
                <div class="details-content">
                    <p><strong>Name:</strong> <span th:text="${app.student.name}"></span></p>
                    <p><strong>Email:</strong> <span th:text="${app.student.email}"></span></p>
                    <p><strong>Department:</strong> <span th:text="${app.student.department}"></span></p>
                    <p><strong>Phone:</strong> <span th:text="${app.student.phone}"></span></p>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    // 展开/隐藏详情
    function toggleDetails(id) {
        const row = document.getElementById('details-' + id);
        row.style.display = (row.style.display === 'table-row') ? 'none' : 'table-row';
    }

    // 处理接受逻辑：禁用按钮防止重复提交
    function handleAccept(form) {
        const btn = form.querySelector('button');
        btn.disabled = true;
        btn.innerText = 'Processing...';
    }
</script>

</body>
</html>
