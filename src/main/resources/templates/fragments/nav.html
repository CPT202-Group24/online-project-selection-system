<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="sharedNav">
    <span>Project Selection System</span>
    <span>
        <span sec:authorize="hasAuthority('student')">
            <a th:href="@{/student/dashboard}">Student Dashboard</a>
        </span>
        <span sec:authorize="hasAuthority('teacher')">
            <a th:href="@{/teacher/dashboard}">Teacher Dashboard</a>
        </span>
        <span sec:authorize="hasAuthority('admin')">
            <a th:href="@{/admin/dashboard}">Admin Dashboard</a>
        </span>
        <span sec:authorize="isAuthenticated()">
            <a th:href="@{/notifications}" class="nav-notification-link">
                Notifications
                <span id="sharedNotificationBadge" class="notification-badge" style="display:none;">0</span>
            </a>
        </span>
    </span>
    <span style="display:flex;align-items:center;gap:16px;">
        <span sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post" style="display:inline;margin:0;">
            <button type="submit" style="width:auto;padding:4px 12px;font-size:14px;margin-top:0;">Logout</button>
        </form>
    </span>
    <script>
        (function () {
            const badge = document.getElementById('sharedNotificationBadge');
            if (!badge) return;

            fetch('/api/notifications/unread-count', { credentials: 'same-origin' })
                .then(function (res) {
                    if (!res.ok) throw new Error('Failed to load unread count');
                    return res.json();
                })
                .then(function (data) {
                    const count = Number(data.unreadCount || 0);
                    if (count > 0) {
                        badge.textContent = String(count);
                        badge.style.display = 'inline-block';
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(function () {
                    badge.style.display = 'none';
                });
        })();
    </script>
</nav>
</body>
</html>
