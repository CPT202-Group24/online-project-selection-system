<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>My Applications - Project Selection System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: sharedNav}"></div>

<div class="container project-page-container">
    <h2>My Applications</h2>

    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-error">
        <span th:text="${errorMessage}"></span>
    </div>

    <div th:if="${#lists.isEmpty(applications)}" class="empty-message">
        You have not submitted any applications yet.
        <a th:href="@{/student/topics}">Browse available topics</a>
    </div>

    <div th:if="${!#lists.isEmpty(applications)}" class="project-table-wrapper">
        <table class="project-table">
            <thead>
            <tr>
                <th>Project Title</th>
                <th>Teacher</th>
                <th>Submitted</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="app : ${applications}">
                <td th:text="${app.project.title}"></td>
                <td th:text="${app.project.teacher.name}"></td>
                <td th:text="${#temporals.format(app.createdAt, 'yyyy-MM-dd')}"></td>
                <td>
                    <span class="status-badge"
                          th:classappend="'status-' + ${app.status.name()}"
                          th:text="${app.status.name()}"></span>
                </td>
                <td>
                    <form th:if="${app.status.name() == 'pending'}"
                          th:action="@{/student/applications/{id}/withdraw(id=${app.id})}"
                          method="post"
                          style="margin:0;"
                          onsubmit="return confirm('Are you sure you want to withdraw this application?')">
                        <button type="submit" class="small-action-btn">Withdraw</button>
                    </form>
                    <span th:if="${app.status.name() != 'pending'}">—</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <p class="back-link-row">
        <a th:href="@{/student/topics}">Browse more topics</a>
    </p>
</div>

</body>
</html>
