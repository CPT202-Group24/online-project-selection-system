<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Project Selection System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: sharedNav}"></div>

<div class="container">
    <h2>Admin Dashboard</h2>
    <p style="margin-bottom:24px;">Welcome, <span sec:authentication="name"></span>. Select a module to manage.</p>

    <div id="stats-section" style="margin-bottom:28px;padding:20px;background:#f9f9f9;border-radius:6px;border:1px solid #eee;">
        <h3 style="margin-bottom:12px;">System statistics</h3>
        <div id="stats-content" class="muted">Loading statistics…</div>
    </div>

    <ul style="list-style:none;padding:0;line-height:2.2;">
        <li><a th:href="@{/admin/categories}">&#9656; Category Management</a></li>
        <li><a th:href="@{/admin/users}">&#9656; User Account Management</a></li>
        <li><a th:href="@{/admin/audit}">&#9656; Audit Log</a></li>
        <li><a th:href="@{/admin/conflicts}">&#9656; Allocation Conflict Logs</a></li>
    </ul>
</div>

<script>
    (function () {
        fetch('/api/admin/stats', { credentials: 'same-origin' })
            .then(function (res) {
                if (!res.ok) throw new Error('stats failed');
                return res.json();
            })
            .then(function (data) {
                var el = document.getElementById('stats-content');
                el.className = '';
                el.innerHTML =
                    '<ul style="margin:0;padding-left:20px;line-height:1.9;">' +
                    '<li><strong>Users</strong>: ' + data.userCount + '</li>' +
                    '<li><strong>Topics</strong>: ' + data.topicCount + '</li>' +
                    '<li><strong>Applications</strong>: ' + data.applicationCount + '</li>' +
                    '</ul>';
            })
            .catch(function () {
                document.getElementById('stats-content').innerHTML =
                    '<span class="muted">Unable to load statistics. Please refresh or sign in as admin.</span>';
            });
    })();
</script>
</body>
</html>
