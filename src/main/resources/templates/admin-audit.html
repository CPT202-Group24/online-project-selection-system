<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Audit Log - Project Selection System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: sharedNav}"></div>

<div class="page-shell">
    <div class="modern-card admin-audit-card">

        <!-- Page Header -->
        <div class="modern-page-header">
            <div class="modern-page-icon">
                🧾
            </div>
            <div>
                <h1 class="modern-page-title">Audit Log</h1>
                <p class="modern-page-subtitle">
                    Search and review administrative operation records
                </p>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="modern-list-toolbar admin-audit-toolbar">
            <div class="admin-audit-search-group">
                <label for="q">Search</label>
                <input type="text"
                       id="q"
                       class="modern-input admin-audit-search"
                       placeholder="e.g. USER_STATUS_TOGGLE or admin@test.com">
            </div>

            <button type="button"
                    class="modern-btn modern-btn-primary"
                    onclick="loadPage(0)">
                Search
            </button>
        </div>

        <!-- Message Area -->
        <div id="msg"></div>

        <!-- Table -->
        <div class="modern-table-wrapper">
            <table class="modern-table project-table admin-audit-table">
                <thead>
                <tr>
                    <th>Time</th>
                    <th>Admin</th>
                    <th>Action</th>
                    <th>Entity</th>
                    <th>Entity ID</th>
                </tr>
                </thead>

                <tbody id="tbody">
                <tr>
                    <td colspan="5" class="muted table-loading-cell">
                        Loading...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="modern-pagination admin-audit-pagination">
            <button type="button"
                    id="btnPrev"
                    class="modern-btn modern-btn-outline table-action-btn"
                    onclick="prevPage()">
                Previous
            </button>

            <span id="pageInfo"></span>

            <button type="button"
                    id="btnNext"
                    class="modern-btn modern-btn-outline table-action-btn"
                    onclick="nextPage()">
                Next
            </button>
        </div>

        <!-- Bottom Actions -->
        <div class="page-bottom-actions">
            <a th:href="@{/admin/dashboard}" class="modern-btn modern-btn-outline">
                ← Back to Dashboard
            </a>
        </div>

    </div>
</div>

<script>
    let currentPage = 0;
    let totalPages = 1;
    const pageSize = 20;

    function showMsg(text, err) {
        const el = document.getElementById('msg');
        el.innerHTML = '<div class="alert alert-' + (err ? 'error' : 'info') + '">' + text + '</div>';
        if (!err) setTimeout(function () { el.innerHTML = ''; }, 3000);
    }

    function esc(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function loadPage(page) {
        currentPage = page;

        const q = document.getElementById('q').value.trim();
        const params = new URLSearchParams({ page: String(page), size: String(pageSize) });

        if (q) {
            params.set('q', q);
        }

        fetch('/api/admin/audit-logs?' + params.toString(), { credentials: 'same-origin' })
            .then(function (r) {
                if (!r.ok) throw new Error('Failed to load');
                return r.json();
            })
            .then(function (data) {
                totalPages = Math.max(1, data.totalPages || 1);

                document.getElementById('pageInfo').textContent =
                    'Page ' + (data.page + 1) + ' / ' + totalPages + ' (' + data.totalItems + ' entries)';

                document.getElementById('btnPrev').disabled = data.page <= 0;
                document.getElementById('btnNext').disabled = data.page >= totalPages - 1;

                const items = data.items || [];
                const tbody = document.getElementById('tbody');

                if (!items.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="muted table-loading-cell">No audit entries found.</td></tr>';
                    return;
                }

                tbody.innerHTML = items.map(function (row) {
                    const t = row.createdAt ? String(row.createdAt).replace('T', ' ') : '';

                    return '<tr>' +
                        '<td>' + esc(t) + '</td>' +
                        '<td>' + esc(row.adminEmail) + '</td>' +
                        '<td><span class="audit-action-badge">' + esc(row.actionType) + '</span></td>' +
                        '<td>' + esc(row.entityType) + '</td>' +
                        '<td>' + esc(row.entityId) + '</td>' +
                        '</tr>';
                }).join('');
            })
            .catch(function () {
                showMsg('Could not load audit logs.', true);
            });
    }

    function prevPage() {
        if (currentPage > 0) {
            loadPage(currentPage - 1);
        }
    }

    function nextPage() {
        if (currentPage < totalPages - 1) {
            loadPage(currentPage + 1);
        }
    }

    loadPage(0);
</script>

</body>
</html>
