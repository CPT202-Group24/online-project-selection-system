<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User Management - Project Selection System</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: sharedNav}"></div>

<div class="page-shell">
    <div class="modern-card admin-users-card">

        <!-- Page Header -->
        <div class="modern-page-header">
            <div class="modern-page-icon">
                👥
            </div>
            <div>
                <h1 class="modern-page-title">User Account Management</h1>
                <p class="modern-page-subtitle">
                    Search users, update account status and manage user roles
                </p>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="modern-list-toolbar admin-user-toolbar">
            <div>
                <p class="result-summary notification-summary">
                    User list
                </p>
            </div>

            <input id="searchInput"
                   class="modern-input admin-user-search"
                   type="text"
                   placeholder="Search by name / email / role..."
                   oninput="renderRows()">
        </div>

        <!-- Messages -->
        <div id="messageBox"></div>

        <!-- Table -->
        <div class="modern-table-wrapper">
            <table class="modern-table project-table admin-user-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th onclick="sortBy('name')" class="sortable-th">
                        Name <span id="sort-name">↕</span>
                    </th>
                    <th>Email</th>
                    <th onclick="sortBy('role')" class="sortable-th">
                        Role <span id="sort-role">↕</span>
                    </th>
                    <th onclick="sortBy('status')" class="sortable-th">
                        Status <span id="sort-status">↕</span>
                    </th>
                    <th>Phone</th>
                    <th>Department</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody id="userTableBody">
                <tr>
                    <td colspan="8" class="muted">Loading users...</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Bottom Actions -->
        <div class="page-bottom-actions">
            <a th:href="@{/admin/dashboard}" class="modern-btn modern-btn-outline">
                ← Back to Dashboard
            </a>
        </div>

    </div>
</div>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
    let users = [];
    let sortKey = null;
    let sortAsc = true;

    function headers(isJson = false) {
        const h = { [csrfHeader]: csrfToken };
        if (isJson) h['Content-Type'] = 'application/json';
        return h;
    }

    function showMessage(text, type = 'info') {
        const box = document.getElementById('messageBox');
        box.innerHTML = `<div class="alert alert-${type === 'error' ? 'error' : 'info'}">${text}</div>`;
        setTimeout(() => box.innerHTML = '', 3500);
    }

    async function loadUsers() {
        try {
            const res = await fetch('/api/admin/users', { headers: headers() });
            users = await res.json();
            renderRows();
        } catch (e) {
            showMessage('Failed to load users.', 'error');
        }
    }

    function sortBy(key) {
        if (sortKey === key) {
            sortAsc = !sortAsc;
        } else {
            sortKey = key;
            sortAsc = true;
        }

        ['name', 'role', 'status'].forEach(k => {
            const el = document.getElementById('sort-' + k);
            if (el) el.textContent = '↕';
        });

        const el = document.getElementById('sort-' + key);
        if (el) el.textContent = sortAsc ? '↑' : '↓';

        renderRows();
    }

    function renderRows() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

        let filtered = users.filter(u => {
            const txt = `${u.name || ''} ${u.email || ''} ${u.role || ''}`.toLowerCase();
            return txt.includes(keyword);
        });

        if (sortKey) {
            filtered = [...filtered].sort((a, b) => {
                const va = String(a[sortKey] || '').toLowerCase();
                const vb = String(b[sortKey] || '').toLowerCase();
                return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
            });
        }

        const tbody = document.getElementById('userTableBody');

        if (!filtered.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="muted">No users found.</td></tr>';
            return;
        }

        tbody.innerHTML = filtered.map(u => `
            <tr>
                <td>${u.id}</td>
                <td>${escapeHtml(u.name || '')}</td>
                <td>${escapeHtml(u.email || '')}</td>
                <td>
                    <span class="role-badge role-${escapeHtml(u.role)}">${escapeHtml(u.role)}</span>
                </td>
                <td>
                    <span class="user-status-badge ${u.status === 'active' ? 'status-active' : 'status-disabled'}">
                        ${escapeHtml(u.status)}
                    </span>
                </td>
                <td>${escapeHtml(u.phone || '-')}</td>
                <td>${escapeHtml(u.department || '-')}</td>
                <td>
                    <div class="admin-user-actions">
                        <button class="modern-btn table-action-btn ${u.status === 'active' ? 'admin-danger-btn' : 'modern-btn-primary'}"
                                onclick="toggleStatus(${u.id}, '${escapeJs(u.name || u.email)}', '${u.status}')">
                            ${u.status === 'active' ? 'Disable' : 'Enable'}
                        </button>

                        <select class="admin-role-select"
                                onchange="changeRole(${u.id}, '${escapeJs(u.name || u.email)}', this.value)">
                            ${['student','teacher','admin'].map(r => `<option value="${r}" ${u.role === r ? 'selected' : ''}>${r}</option>`).join('')}
                        </select>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    async function toggleStatus(id, userLabel, currentStatus) {
        const action = currentStatus === 'active' ? 'disable' : 'enable';

        if (!confirm(`Are you sure you want to ${action} ${userLabel}?`)) return;

        try {
            const res = await fetch(`/api/admin/users/${id}/status`, {
                method: 'PUT',
                headers: headers()
            });

            const data = res.status === 204 ? null : await res.json();

            if (!res.ok) {
                showMessage((data && data.error) || 'Failed to update status.', 'error');
                await loadUsers();
                return;
            }

            showMessage('User status updated successfully.');
            users = users.map(u => u.id === id ? data : u);
            renderRows();
        } catch (e) {
            showMessage('Network error while updating status.', 'error');
        }
    }

    async function changeRole(id, userLabel, newRole) {
        if (!confirm(`Are you sure you want to change ${userLabel}'s role to ${newRole}?`)) {
            await loadUsers();
            return;
        }

        try {
            const res = await fetch(`/api/admin/users/${id}/role`, {
                method: 'PUT',
                headers: headers(true),
                body: JSON.stringify({ role: newRole })
            });

            const data = await res.json();

            if (!res.ok) {
                showMessage(data.error || 'Failed to update role.', 'error');
                await loadUsers();
                return;
            }

            showMessage(`Role updated to ${newRole}.`);
            users = users.map(u => u.id === id ? data : u);
            renderRows();
        } catch (e) {
            showMessage('Network error while updating role.', 'error');
        }
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function escapeJs(str) {
        return String(str)
            .replace(/\\/g, '\\\\')
            .replace(/'/g, "\\'")
            .replace(/"/g, '&quot;');
    }

    loadUsers();
</script>

</body>
</html>
