<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Category Management - Project Selection System</title>
    <meta name="_csrf"        th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: sharedNav}"></div>

<div class="page-shell">
    <div class="modern-card admin-categories-card">

        <!-- Page Header -->
        <div class="modern-page-header">
            <div class="modern-page-icon">
                🏷️
            </div>
            <div>
                <h1 class="modern-page-title">Category Management</h1>
                <p class="modern-page-subtitle">
                    Create, edit, activate or deactivate project topic categories
                </p>
            </div>
        </div>

        <!-- Message Area -->
        <div id="msg"></div>

        <!-- Category Table -->
        <div class="modern-detail-card">
            <div class="section-title-row">
                <h3 class="modern-detail-title">Category List</h3>
            </div>

            <div class="modern-table-wrapper">
                <table id="category-table" class="modern-table project-table admin-category-table">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody id="category-tbody">
                    <tr>
                        <td colspan="5" class="muted table-loading-cell">
                            Loading...
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="modern-pagination admin-category-pagination">
                <button id="prev-page"
                        type="button"
                        class="modern-btn modern-btn-outline table-action-btn"
                        onclick="changePage(-1)">
                    Previous
                </button>

                <span id="page-info">Page 1 / 1</span>

                <button id="next-page"
                        type="button"
                        class="modern-btn modern-btn-outline table-action-btn"
                        onclick="changePage(1)">
                    Next
                </button>
            </div>
        </div>

        <!-- Add Category Form -->
        <form id="add-form" onsubmit="handleAdd(event)" class="modern-form">
            <div class="form-section-card">
                <h3 class="form-section-title">Add New Category</h3>

                <div class="admin-category-form-row">
                    <div class="modern-form-group">
                        <label for="cat-name">Name <span class="required-mark">*</span></label>
                        <input type="text"
                               id="cat-name"
                               class="modern-input"
                               placeholder="e.g. Engineering"
                               required>
                    </div>

                    <div class="modern-form-group">
                        <label for="cat-desc">Description</label>
                        <input type="text"
                               id="cat-desc"
                               class="modern-input"
                               placeholder="Optional description">
                    </div>

                    <button type="submit" class="modern-btn modern-btn-primary">
                        Add Category
                    </button>
                </div>
            </div>
        </form>

        <!-- Bottom Actions -->
        <div class="page-bottom-actions">
            <a th:href="@{/admin/dashboard}" class="modern-btn modern-btn-outline">
                ← Back to Dashboard
            </a>
        </div>

    </div>
</div>

<script>
    const csrfToken  = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    let currentPage = 0;
    let totalPages  = 1;
    const pageSize  = 5;
    let editingId   = null;

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
        setTimeout(() => { el.innerHTML = ''; }, 4000);
    }

    function h(isJson) {
        const hdr = { [csrfHeader]: csrfToken };
        if (isJson) hdr['Content-Type'] = 'application/json';
        return hdr;
    }

    async function loadCategories(page = currentPage) {
        try {
            const res  = await fetch(`/api/admin/categories?page=${page}&size=${pageSize}`, { headers: h(false) });
            const data = await res.json();

            currentPage = data.page || 0;
            totalPages  = Math.max(data.totalPages || 1, 1);

            if (currentPage >= totalPages) {
                loadCategories(totalPages - 1);
                return;
            }

            renderTable(data.items || []);
            renderPagination(data.totalItems || 0);
        } catch (e) {
            showMsg('Failed to load categories.', 'error');
        }
    }

    function renderTable(list) {
        const tbody = document.getElementById('category-tbody');

        if (!list || list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="muted table-loading-cell">No categories yet. Add one below.</td></tr>';
            return;
        }

        tbody.innerHTML = list.map((c, i) => `
            <tr id="row-${c.id}">
                <td>${currentPage * pageSize + i + 1}</td>
                <td><strong>${esc(c.name)}</strong></td>
                <td>${esc(c.description || '—')}</td>
                <td>
                    <span class="category-status-badge ${c.isActive ? 'category-active' : 'category-inactive'}">
                        ${c.isActive ? 'Active' : 'Inactive'}
                    </span>
                </td>
                <td>
                    <div class="admin-category-actions">
                        <button class="modern-btn modern-btn-dark table-action-btn"
                                onclick="showEditRow(${c.id}, '${esc(c.name)}', '${esc(c.description || '')}')">
                            Edit
                        </button>

                        ${c.isActive
            ? `<button class="modern-btn table-action-btn admin-warning-btn"
                                       onclick="handleDeactivate(${c.id}, '${esc(c.name)}')">
                                   Deactivate
                               </button>`
            : `<button class="modern-btn table-action-btn modern-btn-primary"
                                       onclick="handleActivate(${c.id}, '${esc(c.name)}')">
                                   Activate
                               </button>`
        }
                    </div>
                </td>
            </tr>

            <tr class="edit-row" id="edit-row-${c.id}" style="display:none;">
                <td colspan="5">
                    <div class="admin-category-edit-row">
                        <div class="modern-form-group">
                            <label>Name *</label>
                            <input type="text"
                                   id="edit-name-${c.id}"
                                   value="${esc(c.name)}"
                                   class="modern-input"
                                   required>
                        </div>

                        <div class="modern-form-group admin-category-edit-desc">
                            <label>Description</label>
                            <input type="text"
                                   id="edit-desc-${c.id}"
                                   value="${esc(c.description || '')}"
                                   class="modern-input">
                        </div>

                        <button class="modern-btn modern-btn-primary table-action-btn"
                                onclick="submitEdit(${c.id})">
                            Save
                        </button>

                        <button class="modern-btn modern-btn-outline table-action-btn"
                                onclick="hideEditRow(${c.id})">
                            Cancel
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function renderPagination(totalItems) {
        document.getElementById('page-info').textContent =
            `Page ${currentPage + 1} / ${totalPages} (${totalItems} items)`;

        document.getElementById('prev-page').disabled = currentPage <= 0;
        document.getElementById('next-page').disabled = currentPage >= totalPages - 1;
    }

    function changePage(delta) {
        const target = currentPage + delta;
        if (target < 0 || target >= totalPages) return;
        loadCategories(target);
    }

    function showEditRow(id, name, desc) {
        if (editingId && editingId !== id) hideEditRow(editingId);
        editingId = id;
        document.getElementById(`edit-row-${id}`).style.display = 'table-row';
    }

    function hideEditRow(id) {
        const row = document.getElementById(`edit-row-${id}`);
        if (row) row.style.display = 'none';
        if (editingId === id) editingId = null;
    }

    async function submitEdit(id) {
        const name = document.getElementById(`edit-name-${id}`).value.trim();
        const desc = document.getElementById(`edit-desc-${id}`).value.trim();

        if (!name) {
            showMsg('Category name is required.', 'error');
            return;
        }

        try {
            const res = await fetch(`/api/admin/categories/${id}`, {
                method: 'PUT',
                headers: h(true),
                body: JSON.stringify({ name, description: desc })
            });

            if (res.ok) {
                showMsg('Category updated successfully.', 'info');
                loadCategories(currentPage);
            } else {
                const data = await res.json();
                showMsg(data.error || 'Failed to update category.', 'error');
            }
        } catch (e) {
            showMsg('Network error. Please try again.', 'error');
        }
    }

    async function handleDeactivate(id, name) {
        if (!confirm(`Deactivate category "${name}"? It will no longer appear in teacher/student menus, but existing projects will keep the category name.`)) return;

        try {
            const res = await fetch(`/api/admin/categories/${id}/deactivate`, {
                method: 'PUT',
                headers: h(false)
            });

            if (res.ok) {
                showMsg(`Category "${esc(name)}" deactivated.`, 'info');
                loadCategories(currentPage);
            } else {
                showMsg('Failed to deactivate category.', 'error');
            }
        } catch (e) {
            showMsg('Network error. Please try again.', 'error');
        }
    }

    async function handleActivate(id, name) {
        if (!confirm(`Re-activate category "${name}"?`)) return;

        try {
            const res = await fetch(`/api/admin/categories/${id}/activate`, {
                method: 'PUT',
                headers: h(false)
            });

            if (res.ok) {
                showMsg(`Category "${esc(name)}" activated.`, 'info');
                loadCategories(currentPage);
            } else {
                showMsg('Failed to activate category.', 'error');
            }
        } catch (e) {
            showMsg('Network error. Please try again.', 'error');
        }
    }

    async function handleAdd(e) {
        e.preventDefault();

        const name = document.getElementById('cat-name').value.trim();
        const desc = document.getElementById('cat-desc').value.trim();

        if (!name) {
            showMsg('Category name is required.', 'error');
            return;
        }

        try {
            const res = await fetch('/api/admin/categories', {
                method: 'POST',
                headers: h(true),
                body: JSON.stringify({ name, description: desc })
            });

            if (res.status === 201) {
                document.getElementById('add-form').reset();
                showMsg(`Category "${esc(name)}" created successfully.`, 'info');
                loadCategories(0);
            } else {
                const data = await res.json();
                showMsg(data.error || 'Failed to create category.', 'error');
            }
        } catch (e) {
            showMsg('Network error. Please try again.', 'error');
        }
    }

    function esc(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    loadCategories();
</script>

</body>
</html>
