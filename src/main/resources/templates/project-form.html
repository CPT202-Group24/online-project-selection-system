<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Project Form</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
        }

        .form-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 32px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 28px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 14px;
            color: #374151;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border: 1px solid #d0d5dd;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            background: white;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            border-color: #84a9ff;
            box-shadow: 0 0 0 3px rgba(132,169,255,0.15);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .error-text {
            margin-top: 6px;
            font-size: 13px;
            color: #dc2626;
            font-weight: 600;
        }

        .hint-text {
            margin-top: 6px;
            font-size: 12px;
            color: #6b7280;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .btn {
            padding: 12px 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-link {
            display: inline-block;
            margin-top: 18px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h1 th:text="${projectTopic.id != null} ? 'Edit Project' : 'Create New Project'"></h1>

        <form th:action="@{/projects}" th:object="${projectTopic}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label>Title</label>
                <input type="text" th:field="*{title}">
                <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error-text"></div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label>Required Skills</label>
                <textarea th:field="*{requiredSkills}" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>Keywords</label>
                <input type="text" th:field="*{keywords}">
                <div class="hint-text">Example: AI, Java, Spring</div>
            </div>

            <div class="form-group">
                <label>Max Students</label>
                <input type="number" th:field="*{maxStudents}">
            </div>

            <div class="button-group">
                <button type="submit"
                        name="action"
                        value="confirm"
                        class="btn btn-primary"
                        th:text="${projectTopic.id != null} ? 'Confirm' : 'Create'">
                </button>

                <button type="submit"
                        name="action"
                        value="draft"
                        class="btn btn-warning">
                    Save as Draft
                </button>
            </div>
        </form>

        <a href="/projects" class="btn-link">Back to Project List</a>
    </div>
</div>

</body>
</html>
