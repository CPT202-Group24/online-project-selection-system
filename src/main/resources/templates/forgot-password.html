<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Project Selection System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

<div class="auth-shell">
    <div class="auth-card">

        <div class="auth-brand">
            <div class="auth-brand-icon">🎓</div>
            <div>
                <h1>Project Selection System</h1>
                <p>Reset access to your project selection account</p>
            </div>
        </div>

        <div class="auth-header">
            <h2>Forgot Password</h2>
            <p>Enter your registered email address and we will send you a reset link.</p>
        </div>

        <div th:if="${infoMessage}" class="alert alert-info" th:text="${infoMessage}">
        </div>

        <form th:action="@{/forgot-password}" method="post" class="auth-form">

            <div class="modern-form-group">
                <label for="email">Email</label>
                <input id="email"
                       type="email"
                       name="email"
                       class="modern-input"
                       placeholder="your@student.xjtlu.edu.cn or your@xjtlu.edu.cn"
                       required>
            </div>

            <button type="submit" class="modern-btn modern-btn-primary auth-submit-btn">
                Send Reset Link
            </button>
        </form>

        <div class="auth-links">
            <a th:href="@{/login}">← Back to Login</a>
        </div>

    </div>
</div>

</body>
</html>
