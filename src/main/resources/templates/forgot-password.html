<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Project Selection System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Forgot Password</h2>

    <div th:if="${infoMessage}" class="alert alert-info" th:text="${infoMessage}">
    </div>

    <p>Enter your registered email address and we will send you a link to reset your password.</p>

    <form th:action="@{/forgot-password}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="your@student.xjtlu.edu.cn or your@xjtlu.edu.cn" required>
        </div>
        <button type="submit">Send Reset Link</button>
    </form>

    <p style="margin-top: 16px;"><a th:href="@{/login}">Back to Login</a></p>
</div>
</body>
</html>
